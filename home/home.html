<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../reset.css" />
    <link rel="stylesheet" href="./variables.css" />
    <link rel="stylesheet" href="./layout.css" />
    <link rel="stylesheet" href="./toggles.css" />
    <link rel="stylesheet" href="./controls.css" />
  </head>
  <body>
    <main class="grimoire">

      <!-- ═══════════════════════════════════════════════
           LEFT PANEL — Reminder Toggles
           Rows are injected by home.js (renderReminderRows)
      ════════════════════════════════════════════════ -->
      <div class="panel panel--left">

        <header class="panel-header">
          <h1 class="panel-title">Dota 2 Reminders</h1>
          <div class="header-rule"></div>
        </header>

        <div class="turbo-row">
          <span class="rune-icon">⚡</span>
          <span class="reminder-name reminder-name--turbo">Turbo Mode</span>
          <label class="gem-toggle">
            <input type="checkbox" id="turbo-checkbox" />
            <span class="toggle-track">
              <span class="toggle-label--off">Off</span>
              <span class="toggle-gem"></span>
              <span class="toggle-label--on">On</span>
            </span>
          </label>
        </div>

        <div class="section-rule"></div>

        <!-- Populated at runtime by renderReminderRows() in home.js -->
        <div class="reminder-list"></div>

        <div class="coffee-row">
          <a href="https://www.buymeacoffee.com/jordhanrdzM" target="_blank">
            <img
              src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=jordhanrdzM&button_colour=3a2810&font_colour=c8a96e&font_family=Lato&outline_colour=9a7a3a&coffee_colour=d4a017"
              alt="Buy me a coffee"
            />
          </a>
        </div>

      </div><!-- /.panel--left -->

      <!-- ═══════════════════════════════════════════════
           WOOD DIVIDER
      ════════════════════════════════════════════════ -->
      <div class="wood-divider" aria-hidden="true"></div>

      <!-- ═══════════════════════════════════════════════
           RIGHT PANEL — Configuration
      ════════════════════════════════════════════════ -->
      <div class="panel panel--right">

        <header class="panel-header">
          <h1 class="panel-title">General Configuration</h1>
          <div class="header-rule"></div>
        </header>

        <section class="config-section">
          <h2 class="section-title">Alert Delay</h2>
          <p class="section-hint">Seconds before the event to sound the alarm</p>
          <div class="delay-grid">
            <div class="stone-block">
              <label class="stone-label" for="stack-delay">Stack</label>
              <input class="stone-input" id="stack-delay" type="number" min="0" max="30" value="13" />
            </div>
            <div class="stone-block">
              <label class="stone-label" for="midrunes-delay">Mid Runes</label>
              <input class="stone-input" id="midrunes-delay" type="number" min="0" max="30" value="4" />
            </div>
            <div class="stone-block">
              <label class="stone-label" for="bountyrunes-delay">Bounty</label>
              <input class="stone-input" id="bountyrunes-delay" type="number" min="0" max="30" value="3" />
            </div>
            <div class="stone-block">
              <label class="stone-label" for="neutral-delay">Neutrals</label>
              <input class="stone-input" id="neutral-delay" type="number" min="0" max="30" value="0" />
            </div>
            <div class="stone-block">
              <label class="stone-label" for="wisdomrunes-delay">Wisdom</label>
              <input class="stone-input" id="wisdomrunes-delay" type="number" min="0" max="30" value="6" />
            </div>
            <div class="stone-block">
              <label class="stone-label" for="lotus-delay">Lotus</label>
              <input class="stone-input" id="lotus-delay" type="number" min="0" max="30" value="3" />
            </div>
          </div>
        </section>

        <section class="config-section">
          <h2 class="section-title">Incantation Volume</h2>
          <div class="volume-row">
            <button class="stone-btn" id="test-sound">▶ Test Sound</button>
            <div class="volume-slider-wrap">
              <span class="volume-icon">🔇</span>
              <input type="range" id="volume-input" min="0" max="0.9" step="0.1" value="0.5" />
              <span class="volume-icon">🔊</span>
            </div>
          </div>
        </section>

        <section class="config-section footer-section">
          <div class="footer-rule"></div>
          <p class="footer-tagline">
            Dota 2 Reminders <span class="version-tag">v<span id="d2r-version"></span></span> — forged with ❤
          </p>
          <p class="footer-desc">Open source &amp; community driven. Stars welcome. Bugs or suggestions? Join the Discord.</p>
          <div class="link-row">
            <a href="https://dota2reminders.com" target="_blank" class="stone-btn stone-btn--sm">⚜ Website</a>
            <a href="https://github.com/Jordhan-Carvalho/d2r-electron" target="_blank" class="stone-btn stone-btn--sm">⌨ GitHub</a>
            <a href="https://discord.com/invite/maNcHKHpR3" target="_blank" class="stone-btn stone-btn--sm">✦ Discord</a>
          </div>
        </section>

      </div><!-- /.panel--right -->

    </main>

    <script src="../helpers/inputmask.min.js"></script>
    <script src="./home.js"></script>
  </body>
</html>
